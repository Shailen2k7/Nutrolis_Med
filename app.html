<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d8c7c">
<title>Nutrolis AI · Understand your health</title>
<meta name="description" content="Upload any medical report. Nutrolis turns clinical jargon into one calm, plain-language explanation — in your language.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<!-- Supabase (auth + database) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<!-- pdf.js (extract text from digital PDFs) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- Tesseract (OCR fallback for images / scanned reports) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
<style>
/* ====================== DESIGN SYSTEM ====================== */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
:root{
  --bg:#f1f6f4;--bg-2:#e7f0ec;--surface:#ffffff;--surface-2:#f6faf8;--surface-3:#eaf2ef;
  --ink:#0e1c1a;--ink-2:#33453f;--muted:#647571;--line:rgba(14,28,26,.09);--line-2:rgba(14,28,26,.055);
  --teal:#0d8c7c;--teal-2:#0a6e62;--teal-ink:#0a5b51;--aqua:#16b59f;--aqua-2:#34cdb6;
  --amber:#b3841c;--amber-ink:#7e5d0e;--amber-bg:#f8efd5;
  --teal-bg:#d9ece6;--red:#cc6450;--red-bg:#f7e3de;--green:#0d8c7c;
  --shadow:rgba(13,80,72,.13);--glow:rgba(31,185,163,.30);--nav-bg:rgba(241,246,244,.82);
}
[data-theme="dark"]{
  --bg:#08110f;--bg-2:#0b1715;--surface:#0f1c19;--surface-2:#13241f;--surface-3:#172a24;
  --ink:#e9f4f0;--ink-2:#b3c5bf;--muted:#7d918b;--line:rgba(255,255,255,.10);--line-2:rgba(255,255,255,.055);
  --teal:#2bbda6;--teal-2:#1f9c89;--teal-ink:#85e7d4;--aqua:#34cdb6;--aqua-2:#5fe6d0;
  --amber:#e3b75c;--amber-ink:#f0cd84;--amber-bg:rgba(227,183,92,.13);
  --teal-bg:rgba(43,189,166,.13);--red:#e07e65;--red-bg:rgba(224,126,101,.13);
  --shadow:rgba(0,0,0,.5);--glow:rgba(43,189,166,.26);--nav-bg:rgba(8,17,15,.82);
}
body{
  font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;
  background:radial-gradient(1200px 700px at 82% -8%,var(--teal-bg),transparent 60%),
             radial-gradient(900px 600px at 2% 2%,var(--bg-2),transparent 55%),var(--bg);
  color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  min-height:100vh;line-height:1.5;overflow-x:hidden;
}
[dir="rtl"]{font-family:'Hanken Grotesk','Noto Naskh Arabic',system-ui,sans-serif}
::selection{background:var(--teal);color:#fff}
a{color:inherit}
button{font-family:inherit}
input,select,textarea{font-family:inherit}

@keyframes nl-rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes nl-floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes nl-glow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.95;transform:scale(1.1)}}
@keyframes nl-spin{to{transform:rotate(360deg)}}
@keyframes nl-blink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes nl-beam{0%{transform:translateY(-120%)}100%{transform:translateY(360%)}}
@keyframes nl-shimmer{0%{background-position:-280px 0}100%{background-position:280px 0}}
@keyframes nl-pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
@keyframes nl-slidein{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes nl-fade{from{opacity:0}to{opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}}

/* ---------- primitives ---------- */
.brand-logo{position:relative;width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--teal),var(--aqua));display:grid;place-items:center;box-shadow:0 6px 16px -6px var(--glow);flex:none}
.wordmark{font-weight:800;font-size:20px;letter-spacing:-.02em}
.wordmark span{color:var(--teal)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 44px -32px var(--shadow)}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal)}
.muted{color:var(--muted)}
.serif{font-family:'Newsreader',serif;font-style:italic}
.btn{font:inherit;font-weight:700;border-radius:13px;cursor:pointer;border:1px solid transparent;padding:13px 20px;display:inline-flex;align-items:center;justify-content:center;gap:9px;transition:transform .2s cubic-bezier(.34,1.56,.5,1),border-color .2s,background .2s;font-size:15px}
.btn:active{transform:scale(.97)}
.btn-primary{color:#fff;background:linear-gradient(135deg,var(--teal),var(--aqua));box-shadow:0 12px 26px -12px var(--glow)}
.btn-primary:hover{transform:translateY(-2px)}
.btn-ghost{color:var(--ink);background:var(--surface);border-color:var(--line)}
.btn-ghost:hover{border-color:var(--teal)}
.btn-danger{color:#fff;background:var(--red)}
.btn-block{width:100%}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;white-space:nowrap}
.pill-amber{color:var(--amber-ink);background:var(--amber-bg)}
.pill-teal{color:var(--teal-ink);background:var(--teal-bg)}
.pill-red{color:var(--red);background:var(--red-bg)}
.input{width:100%;font:inherit;font-size:15px;padding:13px 14px;border-radius:13px;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);transition:border-color .2s}
.input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-bg)}
label.field{display:block;margin-bottom:14px}
label.field>span{display:block;font-size:13px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
.spinner{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--line);border-top-color:var(--teal);animation:nl-spin .7s linear infinite}
:focus-visible{outline:2px solid var(--teal);outline-offset:2px}

/* ---------- app shell ---------- */
#app{min-height:100vh}
.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;border-right:1px solid var(--line-2);background:var(--nav-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:20px 16px;display:flex;flex-direction:column;gap:6px}
.side-link{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;font-weight:600;font-size:15px;color:var(--ink-2);text-decoration:none;cursor:pointer;transition:background .2s,color .2s;border:none;background:transparent;width:100%;text-align:left}
.side-link:hover{background:var(--surface-3);color:var(--ink)}
.side-link.active{background:var(--teal-bg);color:var(--teal-ink)}
.side-link svg{flex:none}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{display:none}
.content{padding:clamp(20px,4vw,40px);max-width:1100px;width:100%;margin:0 auto;flex:1}
.page-head{margin-bottom:26px;animation:nl-rise .5s both}
.page-head h1{font-size:clamp(26px,4vw,38px);font-weight:800;letter-spacing:-.03em;margin:6px 0 0;line-height:1.08}
.page-head p{margin:8px 0 0;color:var(--ink-2);font-size:16px;max-width:46em}
.bottom-nav{display:none}

/* mobile */
@media (max-width:860px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .topbar{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));background:var(--nav-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line-2)}
  .content{padding:18px 16px 96px}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:45;background:var(--nav-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid var(--line-2);padding:8px 6px;padding-bottom:max(8px,env(safe-area-inset-bottom));justify-content:space-around}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;border-radius:12px;text-decoration:none}
  .tab.active{color:var(--teal)}
  .tab svg{width:23px;height:23px}
}

/* ---------- dashboard ---------- */
.grid{display:grid;gap:16px}
.stat-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.stat{padding:18px 20px;animation:nl-pop .5s both}
.stat .n{font-size:clamp(26px,3.4vw,34px);font-weight:800;letter-spacing:-.03em;line-height:1}
.stat .l{color:var(--muted);font-size:13px;font-weight:600;margin-top:6px}
.score-ring{display:flex;align-items:center;gap:22px;padding:24px;flex-wrap:wrap}
.tile{padding:18px 20px;cursor:pointer;transition:transform .2s,box-shadow .2s;animation:nl-pop .5s both}
.tile:hover{transform:translateY(-3px);box-shadow:0 24px 50px -30px var(--shadow)}
.tile-row{display:flex;align-items:center;gap:13px}
.tile-ico{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;flex:none}
.section-title{font-size:18px;font-weight:800;letter-spacing:-.02em;margin:30px 0 14px;display:flex;align-items:center;gap:10px}
.report-row{display:flex;align-items:center;gap:14px;padding:15px 18px;cursor:pointer;transition:transform .2s,box-shadow .2s;animation:nl-pop .5s both;text-decoration:none;color:inherit}
.report-row:hover{transform:translateY(-2px);box-shadow:0 20px 44px -30px var(--shadow)}
.spark{display:block}
.empty{text-align:center;padding:48px 24px}
.empty svg{opacity:.5}

/* ---------- upload ---------- */
.drop{border:2px dashed var(--line);border-radius:22px;padding:40px 24px;text-align:center;background:var(--surface-2);transition:border-color .2s,background .2s;cursor:pointer}
.drop.drag{border-color:var(--teal);background:var(--teal-bg)}
.proc-step{display:flex;align-items:center;gap:12px;padding:4px 0;transition:opacity .4s}
.proc-dot{width:24px;height:24px;border-radius:50%;flex:none;display:grid;place-items:center;border:1.5px solid var(--line)}

/* ---------- report detail ---------- */
.rsection{padding:22px 24px;margin-bottom:16px;animation:nl-pop .5s both}
.rsection h3{margin:0 0 10px;font-size:16px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
.finding{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line-2)}
.finding:last-child{border-bottom:none}
.marker-chip{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:15px;background:var(--surface-2);border:1px solid var(--line-2);cursor:pointer;transition:transform .2s,border-color .2s;width:100%;text-align:left;font:inherit;color:inherit}
.marker-chip:hover{transform:translateY(-2px);border-color:var(--teal)}

/* ---------- drawer ---------- */
.drawer-scrim{position:fixed;inset:0;background:rgba(8,17,15,.42);backdrop-filter:blur(2px);z-index:60;opacity:0;animation:nl-fade .25s forwards}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(480px,100%);background:var(--surface);z-index:61;box-shadow:-20px 0 60px -30px var(--shadow);display:flex;flex-direction:column;animation:nl-slidein .32s cubic-bezier(.22,1,.36,1)}
[dir="rtl"] .drawer{right:auto;left:0;box-shadow:20px 0 60px -30px var(--shadow);animation:nl-slidein-l .32s cubic-bezier(.22,1,.36,1)}
@keyframes nl-slidein-l{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.drawer-head{padding:18px 20px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--surface);z-index:2}
.drawer-body{overflow-y:auto;padding:20px;flex:1;-webkit-overflow-scrolling:touch}
.edu{margin-bottom:18px}
.edu h4{margin:0 0 5px;font-size:13px;font-weight:800;letter-spacing:.02em;color:var(--teal-ink);text-transform:uppercase}
.edu p{margin:0;font-size:14.5px;line-height:1.6;color:var(--ink-2)}
.edu ul{margin:4px 0 0;padding-left:18px;font-size:14.5px;line-height:1.6;color:var(--ink-2)}
.body-fig{display:block;margin:0 auto}
.body-fig .region{fill:var(--surface-3);stroke:var(--line);stroke-width:1;transition:fill .3s}
.body-fig .region.hot{fill:var(--teal);stroke:var(--teal-2)}
.body-fig .outline{fill:none;stroke:var(--muted);stroke-width:1.5;opacity:.5}

/* toast */
#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(86px + env(safe-area-inset-bottom));z-index:80;background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:13px;font-weight:600;font-size:14px;box-shadow:0 18px 40px -16px var(--shadow);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:861px){#toast{bottom:28px}}

/* range bar */
.range{position:relative;height:8px;border-radius:999px;background:var(--surface-3);margin:14px 0}
.range .band{position:absolute;top:0;bottom:0;background:var(--teal-bg);border-radius:999px}
.range .dot{position:absolute;top:50%;width:15px;height:15px;border-radius:50%;border:3px solid var(--surface);transform:translate(-50%,-50%);box-shadow:0 2px 6px -1px var(--shadow)}

/* segmented */
.seg{display:inline-flex;background:var(--surface-3);border-radius:12px;padding:4px;gap:4px;flex-wrap:wrap}
.seg button{border:none;background:transparent;font:inherit;font-weight:700;font-size:13.5px;color:var(--muted);padding:8px 14px;border-radius:9px;cursor:pointer;transition:background .2s,color .2s}
.seg button.on{background:var(--surface);color:var(--teal-ink);box-shadow:0 2px 8px -4px var(--shadow)}
.hide{display:none!important}
.center{display:grid;place-items:center;min-height:100vh;padding:24px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:12px}
.wrap{display:flex;flex-wrap:wrap;gap:8px}
</style>
</head>

   UI strings in several languages. Report *content* is translated
   on demand by Claude (see translateText); the engine always
   produces English content that can be translated. */

const STR = {
  en:{dashboard:"Dashboard",upload:"Upload",reports:"My Reports",settings:"Settings",

    const m=KB[key];
    for(const alias of m.aliases){
      // alias ... number — \b + negative lookahead stops mid-word matches
      // (e.g. "ast" must not match inside "f-ast-ing glucose")
      const re=new RegExp("\\b"+alias.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"s?(?![a-zA-Z])[^0-9\\n\\r]{0,18}?([0-9]+(?:\\.[0-9]+)?)","i");
      const hit=clean.match(re);
      if(hit){
        const val=parseFloat(hit[1]);
        if(!isNaN(val)&&!seen.has(key)){
          seen.add(key);
          found.push({key,label:m.label,value:val,unit:m.unit,ref_low:m.low,ref_high:m.high,
            status:statusOf(val,m.low,m.high),body_area:m.area});
          break;
        }
      }
    }
  }
  return found;
}

/* detect a date in the report */
function extractDate(text){
  const m=text.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if(m){ let[_,a,b,c]=m; if(c.length===2)c="20"+c; const d=new Date(`${c}-${String(b).padStart(2,"0")}-${String(a).padStart(2,"0")}`); if(!isNaN(d))return d.toISOString().slice(0,10); }
  const m2=text.match(/(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/);
  if(m2){ const d=new Date(m2[0].replace(/[.\/]/g,"-")); if(!isNaN(d))return d.toISOString().slice(0,10); }
  return new Date().toISOString().slice(0,10);
}

/* health score for a single report from its markers */
function scoreFromMarkers(ms){
  if(!ms.length) return 80;
  let penalty=0;
  ms.forEach(m=>{ if(m.status==="high"||m.status==="low"){ const span=(m.ref_high-m.ref_low)||1; const dist=m.status==="low"?(m.ref_low-m.value):(m.value-m.ref_high); const rel=Math.min(1,Math.abs(dist)/span); penalty+=6+rel*9; } });
  return Math.max(35,Math.min(100,Math.round(100-penalty)));
}

/* build the plain-language analysis locally (always works) */
function analyseLocally(text,type,markers){
  const out_of_range=markers.filter(m=>m.status==="high"||m.status==="low");
  const normal=markers.filter(m=>m.status==="normal");
  const score=scoreFromMarkers(markers);

  let snapshot;
  if(!markers.length) snapshot=`This looks like a ${type.label.toLowerCase()}. We've saved it to your health record.`;
  else if(!out_of_range.length) snapshot="Your results look mostly healthy — nothing here calls for worry.";
  else if(out_of_range.length===1) snapshot=`Mostly healthy, with one marker — ${out_of_range[0].label} — worth a gentle look.`;
  else snapshot=`Mostly healthy, with ${out_of_range.length} markers worth a calm second look.`;

  let summary;
  if(!markers.length) summary=`We read your ${type.label.toLowerCase()} and added it to your timeline. When you upload lab values, we'll explain each one in plain language and track how it changes over time.`;
  else summary=`Think of this as a friendly check on your body's numbers. ${normal.length} of your ${markers.length} measured value${markers.length>1?"s are":" is"} sitting comfortably in the healthy range. ${out_of_range.length?`A few — ${out_of_range.map(m=>m.label).join(", ")} — sit a little outside the usual band. That's worth a gentle look with your doctor, not a reason to worry.`:`Nothing here sits outside the usual range, which is lovely news.`}`;

  const good_news=normal.slice(0,5).map(m=>`${m.label} is in a healthy range at ${m.value} ${m.unit}.`);
  if(!good_news.length&&markers.length) good_news.push("You've started tracking these numbers — that itself is a healthy step.");

  const attention=out_of_range.map(m=>{
    const dir=m.status==="low"?"a little low":"a little high";
    return `${m.label} is ${dir} at ${m.value} ${m.unit} (usual ${m.ref_low}–${m.ref_high}). ${KB[m.key].edu.what}`;
  });

  const questions=[];
  out_of_range.forEach(m=>questions.push(`My ${m.label} was ${m.value} ${m.unit} — what could be causing that and should I retest?`));
  if(markers.some(m=>m.key==="ldl"||m.key==="total_cholesterol")) questions.push("Do my cholesterol numbers change anything about my heart-health plan?");
  if(!questions.length) questions.push("Are there any numbers here you'd like me to keep an eye on next time?");
  questions.push("How often should I repeat this test going forward?");

  return {snapshot,summary,score,good_news,attention,questions:questions.slice(0,5),ai_source:"engine"};
}

/* optional: enhance the prose with Claude (secure proxy). Falls back silently. */
async function enhanceWithClaude(text,type,markers,profile){
  try{

    const sys="You are Nutrolis, a calm, warm medical explainer. Never diagnose or prescribe. Explain like the reader is ten, reassuring not alarming. Use 'worth a gentle look' instead of alarm. Always defer to a doctor. Write ALL output in "+langName+". Respond ONLY with strict JSON, no markdown.";
    const prompt=`Report type: ${type.label}\nExtracted markers: ${JSON.stringify(markers.map(m=>({n:m.label,v:m.value,u:m.unit,status:m.status})))}\nReport text (truncated): ${text.slice(0,2500)}\nUser profile: age ${profile?.age||"?"}, notes: ${profile?.health_history||"none"}.\nReturn JSON: {"snapshot":"one calm sentence","summary":"2-3 sentence plain explanation a child understands","good_news":["..."],"attention":["calm, non-alarming ..."],"questions":["personalised questions for the doctor"]}`;
    const r=await fetch(CLAUDE_PROXY,{method:"POST",headers:{"content-type":"application/json","authorization":"Bearer "+SUPABASE_ANON},body:JSON.stringify({system:sys,prompt,max_tokens:1100})});

/* translate report content on demand (uses Claude proxy if available) */
async function translateText(obj,lang){
  if(lang==="en") return obj;
  try{
    const prompt=`Translate the string values of this JSON into ${LANGS.find(l=>l[0]===lang)?.[1]||lang}, keeping keys and structure identical. Return ONLY JSON.\n${JSON.stringify(obj)}`;

}

/* =================================================================
   OCR / TEXT EXTRACTION  (file is used in-memory then discarded)
   ================================================================= */
async function readPdf(file,onProg){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text="";
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const c=await page.getTextContent();
    text+=c.items.map(i=>i.str).join(" ")+"\n";
    onProg&&onProg(0.2+0.5*(p/pdf.numPages));
  }
  // if a PDF has almost no embedded text, it's likely scanned → OCR first page image
  if(text.replace(/\s/g,"").length<40){
    onProg&&onProg(0.3);
    const page=await pdf.getPage(1);
    const vp=page.getViewport({scale:2});
    const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
    await page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
    text=await ocrImage(cv,onProg);
  }
  return text;
}
async function ocrImage(src,onProg){
  const{data}=await Tesseract.recognize(src,"eng",{logger:m=>{ if(m.status==="recognizing text")onProg&&onProg(0.4+0.5*m.progress); }});
  return data.text;
}
async function extractFromFile(file,onProg){
  const isPdf=file.type==="application/pdf"||/\.pdf$/i.test(file.name);
  if(isPdf) return await readPdf(file,onProg);
  return await ocrImage(file,onProg); // images
}

/* =================================================================
   UPLOAD PIPELINE
   ================================================================= */
async function runPipeline(fileOrText,onStep){
  // onStep(index 1..6, status 'active'|'done')
  let text;
  onStep(1,"active");
  if(typeof fileOrText==="string"){ text=fileOrText; onStep(1,"done"); }
  else { text=await extractFromFile(fileOrText,()=>{}); onStep(1,"done"); }

  onStep(2,"active");
  const type=detectType(text); onStep(2,"done");

  onStep(3,"active");
  const markers=extractMarkers(text); onStep(3,"done");

  onStep(4,"active");
  let analysis=analyseLocally(text,type,markers);
  const enhanced=await enhanceWithClaude(text,type,markers,S.profile);
  if(enhanced){ analysis={...analysis,...enhanced}; }
  onStep(4,"done");

  onStep(5,"active");
  const date=extractDate(text);
  const rep=await saveReport(analysis,type,markers,text,date);
  onStep(5,"done");

  onStep(6,"active");
  await loadData(); onStep(6,"done");
  return rep;
}

/* =================================================================
   DASHBOARD AGGREGATION
   ================================================================= */
function latestByKey(){
  const map={};
  S.markers.forEach(m=>{ // markers ordered ascending by date
    if(!map[m.key]) map[m.key]={history:[]};
    map[m.key].history.push(m); map[m.key].latest=m;
  });
  return map;
}
function trendOf(history){
  if(history.length<2) return "stable";
  const a=history[history.length-2], b=history[history.length-1];
  const aBad=a.status!=="normal", bBad=b.status!=="normal";
  if(aBad&&!bBad) return "improving";
  if(!aBad&&bBad) return "attention";
  if(aBad&&bBad){
    const span=(b.ref_high-b.ref_low)||1;
    const dA=b.status==="low"?(a.ref_low-a.value):(a.value-a.ref_high);
    const dB=b.status==="low"?(b.ref_low-b.value):(b.value-b.ref_high);
    if(dB<dA-0.02*span) return "improving";
    if(dB>dA+0.02*span) return "attention";
  }
  return "stable";
}
function dashboardModel(){
  const byKey=latestByKey();
  const latest=Object.values(byKey).map(x=>x.latest);
  const out=latest.filter(m=>m.status!=="normal");
  const overall = S.reports.length
    ? Math.round(S.reports.slice(0,4).reduce((s,r)=>s+(r.health_score||80),0)/Math.min(4,S.reports.length))
    : (latest.length?scoreFromMarkers(latest):0);
  let improving=0,attention=0,stable=0;
  Object.values(byKey).forEach(x=>{ const t=trendOf(x.history); if(t==="improving")improving++; else if(t==="attention")attention++; else stable++; });
  const areas={};
  out.forEach(m=>{ areas[m.body_area]=(areas[m.body_area]||0)+1; });
  return {overall,totalReports:S.reports.length,activeMarkers:latest.length,attentionCount:out.length,
    improving,attention,stable,outMarkers:out,byKey,attentionAreas:Object.keys(areas)};
}
function scoreColor(s){ if(s>=80)return"var(--teal)"; if(s>=60)return"var(--amber)"; return"var(--red)"; }
function scoreLabel(s){ if(s>=80)return"Looking healthy"; if(s>=60)return"Mostly healthy"; if(s>0)return"A few things to watch"; return"Awaiting your first report"; }

    ct:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg>',
    ultrasound:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12a9 9 0 0 1 18 0M6 12a6 6 0 0 1 12 0M9 12a3 3 0 0 1 6 0"/></svg>',

const PIPE_STEPS=["Reading your document","Detecting report type","Analysing your markers","Writing plain explanations","Saving to your health record","Updating your dashboard"];
function renderUpload(){
  app().innerHTML=shell(`<div class="page-head"><span class="eyebrow">${t("upload")}</span><h1>Upload a report</h1><p>A blood panel, scan summary, or prescription — PDF or a clear photo. We read it, explain it, then discard the file. Only the insights are saved.</p></div>
    <div id="up-stage">
      <div class="drop" id="drop">
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4M8 8l4-4 4 4M5 16v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
        <h3 style="font-weight:800;letter-spacing:-.02em;margin:14px 0 4px">Drop your report here</h3>
        <p class="muted" style="margin:0 0 16px">or choose a file · PDF, JPG, PNG</p>
        <button class="btn btn-primary" id="pick">Choose file</button>
        <input type="file" id="file" accept="application/pdf,image/*" class="hide">
      </div>
      <div style="display:flex;align-items:center;gap:14px;margin:20px 0;color:var(--muted)"><div style="flex:1;height:1px;background:var(--line)"></div><span style="font-size:13px;font-weight:700">or</span><div style="flex:1;height:1px;background:var(--line)"></div></div>
      <div class="card" style="padding:20px">
        <div style="font-weight:700;margin-bottom:10px">Paste report text</div>
        <textarea class="input" id="paste" rows="4" placeholder="Paste the values from your report here…"></textarea>
        <div class="wrap" style="margin-top:12px">
          <button class="btn btn-ghost" id="paste-go">Explain pasted text</button>
          <button class="btn btn-ghost" id="sample-go" style="color:var(--teal-ink)">Try a sample report</button>
        </div>
      </div>
      <p class="muted" style="font-size:12.5px;margin-top:16px;line-height:1.6">Nutrolis is an educational companion. It explains your results and helps you ask better questions — it never diagnoses, prescribes, or replaces your doctor.</p>
    </div>`);
  bindShell();
  const fileEl=$("#file"), drop=$("#drop");
  $("#pick").onclick=()=>fileEl.click();
  fileEl.onchange=()=>{ if(fileEl.files[0]) startProcessing(fileEl.files[0]); };
  ["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("drag");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("drag");}));
  drop.addEventListener("drop",e=>{ const f=e.dataTransfer.files[0]; if(f) startProcessing(f); });
  $("#paste-go").onclick=()=>{ const v=$("#paste").value.trim(); if(v.length<10){toast("Paste a little more text first.");return;} startProcessing(v); };
  $("#sample-go").onclick=()=>startProcessing(SAMPLE_REPORT);
}
async function startProcessing(input){
  const stage=$("#up-stage");
  stage.innerHTML=`<div class="card" style="padding:26px">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <div class="spinner" style="width:26px;height:26px"></div>
      <div><div style="font-weight:800;letter-spacing:-.02em">Working through your report</div><div class="muted" style="font-size:13.5px">This stays private — the file is discarded after reading.</div></div>
    </div>
    <div id="steps">${PIPE_STEPS.map((s,i)=>`<div class="proc-step" id="ps-${i+1}" style="opacity:.4"><span class="proc-dot"></span><span style="font-weight:600;font-size:14.5px">${s}</span></div>`).join("")}</div>
  </div>`;
  const setStep=(i,status)=>{ const el=$("#ps-"+i); if(!el)return; const dot=el.querySelector(".proc-dot");
    if(status==="active"){ el.style.opacity="1"; dot.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--teal);animation:nl-blink 1s infinite"></span>'; }
    else if(status==="done"){ el.style.opacity="1"; dot.style.background="var(--teal)"; dot.style.borderColor="var(--teal)"; dot.innerHTML='<span style="color:#fff;display:grid;place-items:center">'+I.check+'</span>'; }
  };
  try{
    const rep=await runPipeline(input,setStep);
    toast("Report explained and saved.");
    setTimeout(()=>go("#/report/"+rep.id),500);
  }catch(e){
    console.error(e);
    stage.innerHTML=`<div class="card" style="padding:26px;text-align:center">
      <span class="pill pill-red" style="margin-bottom:12px">Couldn't finish</span>
      <p style="margin:0 0 16px;color:var(--ink-2)">We couldn't read that one cleanly. Try a clearer photo, a PDF, or paste the text directly.</p>
      <button class="btn btn-primary" data-nav="#/upload">Try again</button></div>`;
    bindShell();
  }
}

          <div style="text-align:right;flex:none"><div style="font-weight:800;color:${scoreColor(r.health_score||80)}">${r.health_score||"–"}</div><div class="muted" style="font-size:12px">${fmtDate(r.report_date)}</div></div>

      <span class="tile-ico" style="background:var(--teal-bg);color:var(--teal-ink)">${reportIcon(r.report_type)}</span>
      <div style="flex:1;min-width:0"><div style="font-weight:700">${esc(r.title||"Report")}</div><div class="muted" style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.snapshot||"")}</div></div>

    ${good.length?`<div class="rsection"><h3 style="color:var(--teal-ink)">${I.check.replace('width="13" height="13"','width="16" height="16"').replace('stroke="currentColor"','stroke="var(--teal)"')}${t("good_news")}</h3>${good.map(g=>`<div class="finding"><span style="color:var(--teal);flex:none;margin-top:2px">${I.check.replace('width="13" height="13"','width="15" height="15"')}</span><span style="color:var(--ink-2);font-size:14.5px">${esc(g)}</span></div>`).join("")}</div>`:""}
    ${att.length?`<div class="rsection"><h3 style="color:var(--amber-ink)">${I.alert}${t("areas_attention")}</h3>${att.map(a=>`<div class="finding"><span style="color:var(--amber-ink);flex:none;margin-top:2px">${I.alert}</span><span style="color:var(--ink-2);font-size:14.5px">${esc(a)}</span></div>`).join("")}</div>`:""}
    ${ms.length?`<div class="rsection"><h3>${I.trend}${t("trends")}</h3>${renderReportTrends(ms)}</div>`:""}
    <div class="rsection"><h3>${I.reports.replace('width="20" height="20"','width="16" height="16"')}${t("questions")}</h3>${qs.map(q=>`<div class="finding"><span style="color:var(--teal);flex:none;font-weight:800">Q</span><span style="color:var(--ink-2);font-size:14.5px">${esc(q)}</span></div>`).join("")}</div>
    <div class="rsection" style="text-align:center"><h3 style="justify-content:center">Learn more</h3><p class="muted" style="margin:0 0 14px">Open the interactive body view to explore the organs and systems this report touches.</p><div class="wrap" style="justify-content:center">${[...new Set(ms.map(m=>m.body_area))].slice(0,5).map(a=>`<button class="btn btn-ghost" data-organ="${a}" style="padding:9px 16px">${esc((ORGANS[a]||{label:a}).label)}</button>`).join("")||`<button class="btn btn-ghost" data-organ="blood">Explore body view</button>`}</div></div>
    <p class="muted" style="font-size:12.5px;text-align:center;margin:6px 0 0">This is educational, not a diagnosis. Always discuss your results with a healthcare professional.</p>
  `);
  bindShell();
  app().querySelectorAll("[data-marker]").forEach(b=>b.onclick=()=>openMarkerDrawer(b.dataset.marker));
  app().querySelectorAll("[data-organ]").forEach(b=>b.onclick=()=>openOrganDrawer(b.dataset.organ));
}
function renderReportTrends(ms){
  // compare each marker to its own history
  return ms.map(mk=>{
    const hist=S.markers.filter(x=>x.key===mk.key).sort((a,b)=>new Date(a.report_date)-new Date(b.report_date));
    if(hist.length<2) return `<div class="finding"><span style="font-size:14.5px;color:var(--ink-2)"><strong>${esc(mk.label)}</strong> — first reading at ${mk.value} ${esc(mk.unit)}. We'll track changes from here.</span></div>`;
    const tr=trendOf(hist); const prev=hist[hist.length-2];
    const word=tr==="improving"?"improving":tr==="attention"?"worth watching":"holding steady";
    const col=tr==="improving"?"var(--teal-ink)":tr==="attention"?"var(--amber-ink)":"var(--muted)";
    return `<div class="finding"><span style="font-size:14.5px;color:var(--ink-2)"><strong>${esc(mk.label)}</strong> — ${prev.value} → ${mk.value} ${esc(mk.unit)}, <span style="color:${col};font-weight:700">${word}</span> ${sparkline(hist)}</span></div>`;
  }).join("");
}
function sparkline(hist){
  const vals=hist.map(h=>h.value); const min=Math.min(...vals),max=Math.max(...vals),span=(max-min)||1;
  const w=70,h=20; const pts=vals.map((v,i)=>`${(i/(vals.length-1))*w},${h-((v-min)/span)*h}`).join(" ");
  return `<svg class="spark" width="${w}" height="${h}" style="display:inline-block;vertical-align:middle;margin-left:6px"><polyline points="${pts}" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

/* =================================================================
   DRAWER — interactive body + medical encyclopedia
   ================================================================= */
function openDrawer(html){
  closeDrawer();
  const wrap=document.createElement("div"); wrap.id="drawer-wrap";
  wrap.innerHTML=`<div class="drawer-scrim" data-close="1"></div><aside class="drawer" role="dialog" aria-modal="true">${html}</aside>`;
  document.body.appendChild(wrap);
  document.body.style.overflow="hidden";
  wrap.querySelector("[data-close]").onclick=closeDrawer;
  wrap.querySelector("[data-x]").onclick=closeDrawer;
  document.addEventListener("keydown",escClose);
}
function escClose(e){ if(e.key==="Escape")closeDrawer(); }
function closeDrawer(){ const w=$("#drawer-wrap"); if(w){ w.remove(); document.body.style.overflow=""; document.removeEventListener("keydown",escClose); } }

function eduBlock(e,extra){
  const sec=(title,content)=>content?`<div class="edu"><h4>${title}</h4>${content}</div>`:"";
  const list=(arr)=>arr&&arr.length?`<ul>${arr.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:"";
  return `
    ${sec("What is it?",`<p>${esc(e.what)}</p>`)}
    ${sec("Why it matters",`<p>${esc(e.why)}</p>`)}
    ${sec("How it functions",`<p>${esc(e.func)}</p>`)}
    ${extra||""}
    ${sec("Healthy range",`<p>${esc(e.range)}</p>`)}
    ${sec("What raises it",`<p>${esc(e.high)}</p>`)}
    ${sec("What lowers it",`<p>${esc(e.low)}</p>`)}
    ${sec("How to improve it",list(e.improve))}
    ${sec("When to speak to a doctor",`<p>${esc(e.doctor)}</p>`)}
    ${sec("Related conditions",list(e.related))}
    ${sec("Fun fact",`<p style="font-style:italic">${esc(e.fun)}</p>`)}
  `;
}
function drawerHead(title,sub){
  return `<div class="drawer-head"><span class="brand-logo" style="width:30px;height:30px">${I.logo}</span>
    <div style="flex:1;min-width:0"><div style="font-weight:800;letter-spacing:-.01em">${esc(title)}</div>${sub?`<div class="muted" style="font-size:12.5px">${esc(sub)}</div>`:""}</div>
    <button data-x="1" aria-label="Close" style="border:none;background:var(--surface-3);width:34px;height:34px;border-radius:10px;cursor:pointer;color:var(--ink-2);display:grid;place-items:center;flex:none">${I.x}</button></div>`;
}
function openMarkerDrawer(key){
  const k=KB[key]; if(!k)return;
  const latest=[...S.markers].filter(m=>m.key===key).pop();
  const e=k.edu;
  let valueBlock="";
  if(latest){
    const lo=k.low,hi=k.high,span=(hi-lo)||1;
    const pos=Math.max(2,Math.min(98,((latest.value-lo)/span)*100));
    const col=latest.status==="normal"?"var(--teal)":"var(--amber)";
    valueBlock=`<div class="edu"><h4>Your latest reading</h4>
      <div style="display:flex;align-items:baseline;gap:6px"><span style="font-size:34px;font-weight:800;letter-spacing:-.03em">${latest.value}</span><span class="muted" style="font-weight:600">${esc(latest.unit)}</span>
      <span class="pill ${latest.status==="normal"?"pill-teal":"pill-amber"}" style="margin-left:auto">${latest.status==="normal"?"In range":latest.status==="low"?"Slightly low":"Slightly high"}</span></div>
      <div class="range"><div class="band" style="left:30%;width:40%"></div><div class="dot" style="left:${pos}%;background:${col}"></div></div>
      <p class="muted" style="font-size:12.5px;margin:0">Usual range ${lo}–${hi} ${esc(k.unit)}</p></div>`;
  }
  const fig=`<div class="edu" style="text-align:center;background:var(--surface-2);border-radius:18px;padding:16px">${bodyFigure([k.area])}<p class="muted" style="font-size:12.5px;margin:6px 0 0">Body area: ${esc((ORGANS[k.area]||{label:k.area}).label)}</p></div>`;
  openDrawer(drawerHead(k.label,"Health encyclopedia")+`<div class="drawer-body">${valueBlock}${fig}${eduBlock(e)}<p class="muted" style="font-size:12px;margin-top:8px">Educational only — not a diagnosis. Discuss concerns with your doctor.</p></div>`);
}
function openOrganDrawer(area){
  const o=ORGANS[area]||ORGANS.blood;
  const fig=`<div class="edu" style="text-align:center;background:var(--surface-2);border-radius:18px;padding:16px">${bodyFigure([area])}<p class="muted" style="font-size:12.5px;margin:6px 0 0">Highlighted: ${esc(o.label)}</p></div>`;
  const related=S.markers.filter(m=>m.body_area===area);
  const relBlock=related.length?`<div class="edu"><h4>Your markers here</h4><div class="wrap">${[...new Set(related.map(m=>m.key))].map(k=>`<button class="pill pill-teal" style="cursor:pointer;border:none" data-jump="${k}">${esc(KB[k].label)}</button>`).join("")}</div></div>`:"";
  openDrawer(drawerHead(o.label,"Body & systems")+`<div class="drawer-body">${fig}${relBlock}${eduBlock(o.edu)}<p class="muted" style="font-size:12px;margin-top:8px">Educational only — not a diagnosis.</p></div>`);
  $("#drawer-wrap").querySelectorAll("[data-jump]").forEach(b=>b.onclick=()=>openMarkerDrawer(b.dataset.jump));
}

/* ---------------- SETTINGS ---------------- */
function renderSettings(){
  const p=S.profile||{};
  const langOpts=LANGS.map(([c,n])=>`<option value="${c}" ${S.lang===c?"selected":""}>${n}</option>`).join("");
  app().innerHTML=shell(`<div class="page-head"><span class="eyebrow">${t("settings")}</span><h1>${t("settings")}</h1></div>
    <div class="card rsection"><h3>Profile</h3>
      <label class="field"><span>${t("name")}</span><input class="input" id="s-name" value="${esc(p.full_name||"")}"></label>
      <div style="display:flex;gap:12px;flex-wrap:wrap"><label class="field" style="flex:1;min-width:120px"><span>Age</span><input class="input" id="s-age" type="number" value="${esc(p.age||"")}"></label>
      <label class="field" style="flex:1;min-width:120px"><span>Gender</span><select class="input" id="s-gender"><option value="">—</option>${["Female","Male","Other"].map(g=>`<option ${p.gender===g?"selected":""}>${g}</option>`).join("")}</select></label></div>
      <label class="field"><span>Health history</span><textarea class="input" id="s-hist" rows="2">${esc(p.health_history||"")}</textarea></label>
      <label class="field"><span>Allergies (optional)</span><input class="input" id="s-all" value="${esc(p.allergies||"")}"></label>
      <label class="field"><span>Medications (optional)</span><input class="input" id="s-med" value="${esc(p.medications||"")}"></label>
      <label class="field"><span>Lifestyle (optional)</span><input class="input" id="s-life" value="${esc(p.lifestyle||"")}" placeholder="e.g. vegetarian, runs 3x/week"></label>
      <button class="btn btn-primary" id="s-save">Save profile</button>
    </div>
    <div class="card rsection"><h3>Language</h3><p class="muted" style="margin:0 0 10px;font-size:14px">The interface adapts instantly to your language, and Arabic and Urdu switch to right-to-left automatically. New report explanations are written in your language when the Claude layer is connected.</p>
      <select class="input" id="s-lang">${langOpts}</select></div>
    <div class="card rsection"><h3>Theme</h3><div class="spread"><span style="color:var(--ink-2)">${S.theme==="dark"?"Dark":"Light"} mode</span>
      <button class="btn btn-ghost" id="s-theme">Switch to ${S.theme==="dark"?"light":"dark"}</button></div></div>
    <div class="card rsection"><h3>Notifications</h3><div class="spread"><span style="color:var(--ink-2)">Gentle reminders to upload new reports</span>
      <button class="btn ${p.notifications!==false?"btn-primary":"btn-ghost"}" id="s-notif">${p.notifications!==false?"On":"Off"}</button></div></div>
    <div class="card rsection"><h3>Export health data</h3><p class="muted" style="margin:0 0 12px;font-size:14px">Download everything Nutrolis knows about your health as a JSON file you can keep.</p>
      <button class="btn btn-ghost" id="s-export">Export my data</button></div>
    <div class="card rsection" style="border-color:var(--red-bg)"><h3 style="color:var(--red)">Delete health data</h3>
      <p class="muted" style="margin:0 0 12px;font-size:14px">This permanently removes all your reports and markers. To confirm, type <strong>DELETE</strong> below.</p>
      <input class="input" id="s-del" placeholder="Type DELETE to confirm" style="margin-bottom:12px">
      <button class="btn btn-danger" id="s-delete" disabled style="opacity:.5">Delete everything</button></div>
    <p class="muted" style="font-size:12.5px;text-align:center;margin:18px 0 0">Nutrolis AI · educational companion, never a replacement for your doctor.</p>`);
  bindShell();
  $("#s-save").onclick=async()=>{ await saveProfile({full_name:$("#s-name").value.trim(),age:parseInt($("#s-age").value)||null,gender:$("#s-gender").value||null,health_history:$("#s-hist").value.trim(),allergies:$("#s-all").value.trim(),medications:$("#s-med").value.trim(),lifestyle:$("#s-life").value.trim()}); toast("Profile saved."); };
  $("#s-lang").onchange=async(e)=>{ S.lang=e.target.value; applyDir(); await saveProfile({language:S.lang}); toast("Language updated."); renderSettings(); };
  $("#s-theme").onclick=()=>{ toggleTheme(); renderSettings(); };
  $("#s-notif").onclick=async()=>{ const v=!(S.profile.notifications!==false); await saveProfile({notifications:v}); renderSettings(); };
  $("#s-export").onclick=()=>{ const blob=new Blob([JSON.stringify({profile:S.profile,reports:S.reports,markers:S.markers},null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="nutrolis-health-data.json"; a.click(); toast("Your data is downloading."); };
  const del=$("#s-del"), delBtn=$("#s-delete");
  del.oninput=()=>{ const ok=del.value.trim()==="DELETE"; delBtn.disabled=!ok; delBtn.style.opacity=ok?"1":".5"; };
  delBtn.onclick=async()=>{ if(del.value.trim()!=="DELETE")return; delBtn.disabled=true; delBtn.textContent="Deleting…"; await deleteAllData(); toast("All health data deleted."); go("#/dashboard"); };
}

/* =================================================================
   SHARED EVENT BINDING + ROUTER + BOOT
   ================================================================= */
function bindShell(){
  app().querySelectorAll("[data-nav]").forEach(b=>b.onclick=(e)=>{e.preventDefault();go(b.dataset.nav);});
  app().querySelectorAll('[data-act="theme"]').forEach(b=>b.onclick=()=>{toggleTheme();render();});
  app().querySelectorAll('[data-act="signout"]').forEach(b=>b.onclick=doSignOut);
}

function render(){
  if(!S.user){ renderLogin(); return; }
  if(S.profile && !S.profile.onboarded){ renderOnboarding(); return; }
  applyTheme(); applyDir();
  const hash=location.hash||"#/dashboard";
  if(hash.startsWith("#/report/")) return renderReport(hash.split("/")[2]);
  switch(hash){
    case "#/upload":   return renderUpload();
    case "#/reports":  return renderReports();
    case "#/settings": return renderSettings();
    case "#/login":    return renderLogin();
    default:           return renderDashboard();
  }
}

async function boot(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){ S.user=null; applyTheme(); renderLogin(); return; }
  S.user=session.user;
  await loadProfile();
  applyTheme(); applyDir();
  await loadData();
  if(!location.hash||location.hash==="#/login") location.hash="#/dashboard";
  render();
}

window.addEventListener("hashchange",()=>{ if(S.user) render(); });
sb.auth.onAuthStateChange((event)=>{ if(event==="SIGNED_OUT"){ S.user=null; renderLogin(); } });

/* go! */
boot();
</script>
</body>
</html>
